name: Multi-Platform Testing Workflow

on:
  pull_request:
    branches:
      - main

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print OS Information
        run: echo "Running on Ubuntu Linux"

      - name: Show System Info
        run: uname -a

      - name: Create and Display a File
        run: |
          echo "Hello from Ubuntu!" > test-file.txt
          cat test-file.txt

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print OS Information
        run: echo "Running on Windows"

      - name: Show System Info
        run: systeminfo | findstr /C:"OS Name" /C:"OS Version"

      - name: Create and Display a File
        run: |
          echo "Hello from Windows!" > test-file.txt
          type test-file.txt

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print OS Information
        run: echo "Running on macOS"

      - name: Show System Info
        run: uname -a

      - name: Create and Display a File
        run: |
          echo "Hello from macOS!" > test-file.txt
          cat test-file.txt