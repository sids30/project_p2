name: Environment Variables and Secrets Workflow

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: production

jobs:
  deploy-to-aws:
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_NAME: my-app-deployment

    steps:
      - name: Print Workflow-Level Environment Variables
        run: |
          echo "AWS Region: $AWS_REGION"
          echo "Environment: $ENVIRONMENT"

      - name: Access AWS Credentials from Secrets
        run: |
          echo "AWS Access Key ID: ${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "AWS Secret Access Key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Print Job-Level Environment Variable
        run: |
          echo "Deployment Name: $DEPLOYMENT_NAME"

      - name: Set and Use Step-Level Environment Variable
        run: |
          echo "Step Variable: $STEP_VAR"
          echo "This variable only exists in this step"
        env:
          STEP_VAR: step-level-value-123

      - name: Demonstrate Variable Scope
        run: |
          echo "--- Scope Summary ---"
          echo "Workflow-level AWS_REGION: $AWS_REGION"
          echo "Workflow-level ENVIRONMENT: $ENVIRONMENT"
          echo "Job-level DEPLOYMENT_NAME: $DEPLOYMENT_NAME"
          echo "Step-level STEP_VAR is not accessible here (different step)"